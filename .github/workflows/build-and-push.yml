name: Build & Push Image
on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag like v1.0.1"
        required: true
        type: string
permissions:
  contents: read
  packages: write   # 推 GHCR 必须
  # id-token: write # 如果你用 OIDC 另说
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/my-image  # 你想要的镜像名（可改）
  UPSTREAM_REPO: https://github.com/ZhuLinsen/daily_stock_analysis.git   # 改成真实 upstream
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (fork repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拿到完整历史/标签基础
      - name: Fetch upstream tags and checkout tag
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $RELEASE_TAG (expected vX.Y.Z)"
            exit 1
          fi
          # 拉 upstream 的 tags（即使 fork 没有这个 tag，也能拿到）
          git fetch --force --tags "${UPSTREAM_REPO}"
          # 用 refs/tags 避免歧义
          git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null
          git checkout "refs/tags/$RELEASE_TAG"
          echo "Checked out tag: $RELEASE_TAG"
          git status
          git describe --tags --always
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.release_tag }}

            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
