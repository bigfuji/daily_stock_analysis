name: Build & Push (latest code)

on:
  workflow_dispatch: {}
  # 也可以改成你每次 push 就自动构建（可选）
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # 最终镜像名：ghcr.io/<你的用户名或组织>/<镜像名>
  IMAGE_NAME: ${{ github.repository_owner }}/daily_stock_analysis

  # 改成 upstream 原仓库（不是你的 fork）
  UPSTREAM_REPO: ZhuLinsen/daily_stock_analysis
  # 改成 upstream 的默认分支（main 或 master）
  UPSTREAM_REF: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 直接 checkout upstream 最新代码（不看 tag，不看 release）
      - name: Checkout upstream latest
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ env.UPSTREAM_REF }}
          fetch-depth: 1

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short HEAD)"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.short_sha }}

